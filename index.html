<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA EXTERNALIZAR - Acceso de Prueba</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #1a4fdb; display: flex; justify-content: center; align-items: center; }
        .login-card { background-color: white; padding: 50px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 90%; max-width: 1000px; display: flex; gap: 50px; align-items: center; }
        .form-section { flex: 1.2; }
        .form-section h1 { color: #0d3b0d; font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .input-group input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background-color: #f9f9f9; box-sizing: border-box; font-size: 16px; }
        .login-button { background-color: #67b9e8; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .login-button:hover { background-color: #55a8d6; }
        .image-section { flex: 1; display: flex; justify-content: center; }
        .image-section img { max-width: 100%; height: auto; }
        .badge-prueba { background: #fef3c7; color: #92400e; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="form-section">
            <div class="badge-prueba">MODO DE PRUEBA ACTIVO</div>
            <h1>Bienvenid@ a Externalizar</h1>
            <p>Puedes ingresar cualquier dato para probar el panel.</p>
            <form id="loginForm">
                <div class="input-group">
                    <label>RUT</label>
                    <input type="text" id="rutInput" placeholder="Ej: 12345678-9">
                </div>
                <div class="input-group">
                    <label>CONTRASEÑA</label>
                    <input type="password" id="passInput" placeholder="**********">
                </div>
                <button type="submit" class="login-button" id="btnIngresar">Ingresar al Panel</button>
            </form>
        </div>
        <div class="image-section">
            <img src="calculadora.jpg" alt="Calculadora">
        </div>
    </div>

    <script>
        // Limpiamos cualquier sesión previa al cargar
        localStorage.clear();

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue solo
            
            const btn = document.getElementById('btnIngresar');
            btn.innerText = "Entrando...";
            btn.disabled = true;

            // --- SALTO DIRECTO PARA PRUEBAS ---
            // Guardamos un nombre ficticio para que la otra página lo muestre
            localStorage.setItem('nombreUsuario', 'Invitado de Desarrollo');
            
            // Redirigir de inmediato a la página del trabajador
            window.location.href = "trabajador.html";
        });
    </script>
</body>
</html>
