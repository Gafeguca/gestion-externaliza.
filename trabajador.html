<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --azul-p: #1a4fdb; --oscuro: #0f172a; --fondo: #f8fafc; }
        body { display: flex; background-color: var(--fondo); min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--oscuro); color: white; padding: 30px 20px; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 100; }
        .sidebar h4 { color: #38bdf8; text-align: center; font-weight: 800; margin-bottom: 40px; font-size: 1.2rem; }
        .nav-link { color: #94a3b8; padding: 12px; text-decoration: none; display: block; border-radius: 10px; margin-bottom: 5px; transition: 0.2s; }
        .nav-link.active { background: var(--azul-p); color: white; }
        .nav-link:hover:not(.active) { background: rgba(255,255,255,0.05); color: white; }
        
        /* Contenido */
        .content { margin-left: 260px; flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .header-panel { width: 100%; max-width: 800px; text-align: left; margin-bottom: 40px; }
        .options-menu { width: 100%; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .btn-panel { 
            background: white; padding: 30px; border-radius: 20px; text-align: center; 
            text-decoration: none; color: #1e293b; border: 1px solid #e2e8f0; 
            font-weight: 600; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-panel:hover { border-color: var(--azul-p); color: var(--azul-p); transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .logout { margin-top: auto; color: #f87171 !important; border: 1px solid rgba(248,113,113,0.2); text-align: center; cursor: pointer; font-weight: bold; }
        .logout:hover { background: rgba(248,113,113,0.1); }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .sidebar h4, .nav-link span { display: none; }
            .content { margin-left: 70px; }
            .options-menu { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4>SIA EXTERNALIZAR</h4>
        <nav>
            <a href="trabajador.html" class="nav-link active">🏠 <span>INICIO</span></a>
            <a href="#" class="nav-link">📊 <span>DASHBOARD</span></a>
            <a href="#" class="nav-link">📝 <span>REGISTRO</span></a>
        </nav>
        <a id="btnExit" class="nav-link logout">❌ SALIR</a>
    </div>

    <div class="content">
        <div class="header-panel">
            <h2 id="saludoTxt" style="font-weight: 800; color: #1e293b; font-size: 2.2rem;">Cargando...</h2>
            <p style="color: #64748b;">Panel de gestión administrativa</p>
        </div>

        <div class="options-menu">
            <a href="#" class="btn-panel"><span>📊</span> Dashboard</a>
            <a href="#" class="btn-panel"><span>👥</span> Clientes</a>
            <a href="#" class="btn-panel"><span>⚖️</span> Match Contable</a>
            <a href="#" class="btn-panel"><span>📑</span> Facturador Masivo</a>
        </div>
    </div>

    <script>
        // Verificación de sesión
        const nombre = localStorage.getItem('nombreUsuario');
        
        if (!nombre) {
            // Si no hay nombre, lo manda al login (index.html)
            window.location.href = "index.html";
        } else {
            document.getElementById('saludoTxt').innerText = "Bienvenido, " + nombre;
        }

        // Lógica de Salida Corregida
        document.getElementById('btnExit').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.clear(); // Borra la "sesión"
            window.location.href = "index.html"; // Redirige al login principal
        });
    </script>
</body>
</html>
