<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-deep: #0f172a;
            --azul-brillante: #1a4fdb;
            --celeste-soft: #38bdf8;
            --fondo: #f8fafc;
        }

        body { 
            background-color: var(--fondo); 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Sidebar Fija e Inamovible */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, var(--azul-deep) 0%, #1e293b 100%);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            flex-shrink: 0;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar-header {
            padding: 0 25px 30px;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--celeste-soft);
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav-links { display: flex; flex-direction: column; gap: 5px; padding: 20px 15px; }

        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            background: rgba(56, 189, 248, 0.1);
            color: white;
        }

        .nav-links a.active { background: var(--azul-brillante); box-shadow: 0 4px 12px rgba(26, 79, 219, 0.3); }

        /* Área de Contenido Principal */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            position: relative;
            overflow-y: auto; /* Permite scroll solo en el contenido, no en el menú */
        }

        /* Caja de Usuario Superior */
        .user-card {
            position: absolute;
            top: 30px;
            right: 40px;
            background: white;
            padding: 10px 20px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            z-index: 100;
        }

        .user-icon {
            width: 35px;
            height: 35px;
            background: var(--azul-brillante);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Control de Secciones */
        .section-panel { display: none; margin-top: 60px; animation: fadeIn 0.4s ease; }
        .section-panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo Tabla Clientes */
        .card-custom {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        .btn-table { padding: 4px 12px; font-size: 13px; font-weight: 600; border-radius: 6px; margin: 2px; }

        /* Grid de Botones Dashboard */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .menu-item {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #f1f5f9;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .menu-item:hover { transform: translateY(-5px); border-color: var(--azul-brillante); }
        .menu-item i { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

        <div class="sidebar-header">SIA EXTERNALIZAR</div>
        <nav class="nav-links">
            <a
