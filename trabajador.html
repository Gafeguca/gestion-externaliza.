<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - El Contador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; margin: 0; font-family: Arial, sans-serif; }
        
        /* Barra de Navegación Superior */
        .navbar-custom { background-color: #4a76c5; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; color: white; position: relative; z-index: 10; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .nav-links a:hover { opacity: 0.8; }
        
        .logo-box { background-color: #0d1b4d; padding: 5px 15px; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
        .logo-box span { font-size: 12px; }

        /* Perfil de Usuario Ajustado (Solo nombre) */
        .user-profile { 
            background: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            border: 1px solid #ced4da; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: #333; 
            position: absolute; 
            right: 20px; 
            top: 70px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        .user-icon { width: 40px; height: 40px; background: #4a76c5; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .user-name-tag { font-weight: 800; font-size: 16px; color: #1a1a1a; }

        /* Contenedor Central */
        .main-container { display: flex; flex-direction: column; align-items: center; padding-top: 80px; width: 100%; }
        .welcome-msg { font-size: 26px; color: #444; margin-bottom: 40px; font-weight: 600; }

        /* Lista de Botones */
        .menu-list { display: flex; flex-direction: column; gap: 12px; width: 90%; max-width: 600px; padding-bottom: 50px; }
        .menu-item { background: white; border: 2px solid #adb5bd; border-radius: 10px; padding: 18px; text-align: center; text-decoration: none; color: #212529; font-weight: bold; font-size: 18px; transition: 0.2s; }
        .menu-item:hover { background: #f8f9fa; border-color: #4a76c5; color: #4a76c5; transform: scale(1.01); }
    </style>
</head>
<body>

    <div class="navbar-custom">
        <div class="logo-box">
            <span>SIA - EL CONTADOR</span>
        </div>
        <div class="nav-links">
            <a href="#">Inicio</a>
            <a href="#">Dashboard</a>
            <a href="#">Registro</a>
            <a href="#">Informacion</a>
            <a href="#">Match</a>
            <a href="#">Descargas</a>
            <a href="#">Usuarios</a>
            <a id="btnExitNav" style="color: #ffbaba; margin-left: 10px;">CERRAR SESIÓN</a>
        </div>
    </div>

    <div class="user-profile">
        <div class="user-icon">👤</div>
        <div class="user-name-tag" id="nombreUsuarioLabel">Cargando...</div>
    </div>

    <div class="main-container">
        <div class="welcome-msg" id="saludoBienvenida">Bienvenido</div>

        <div class="menu-list">
            <a href="#" class="menu-item">Dashboard</a>
            <a href="#" class="menu-item">Registro y actualización de Clientes</a>
            <a href="#" class="menu-item">Detalle Servicios y Carga Información</a>
            <a href="#" class="menu-item">Match Contable</a>
            <a href="#" class="menu-item">Descarga Libros</a>
            <a href="#" class="menu-item">Facturador Masivo</a>
            <a href="#" class="menu-item">Usuarios</a>
        </div>
    </div>

    <script>
        // Obtener el nombre guardado (ya sea del Excel o del modo prueba)
        const nombre = localStorage.getItem('nombreUsuario') || "Invitado";
        
        // Aplicar nombre a la bienvenida y al recuadro de la derecha
        document.getElementById('saludoBienvenida').innerText = "Bienvenido " + nombre;
        document.getElementById('nombreUsuarioLabel').innerText = nombre;

        // Lógica para el botón de Cerrar Sesión
        document.getElementById('btnExitNav').addEventListener('click', function() {
            localStorage.clear();
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
